packages:
  - ./cdk
  - ./app
  - ./app/cdk
  - ./cdk/function

minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - 'lodash@4.18.1'
  - 'handlebars@4.7.9'
  - esbuild@0.27.7
  - '@esbuild/*'
  - '@vitest/*'
  - vitest@4.1.3
  - vite@8.0.7

overrides:
  '@types/node': '^24'
  eslint-import-resolver-typescript: '>=4'
  lodash@<=4.17.23: '>=4.18.0'
  lodash@>=4.0.0 <=4.17.23: '>=4.18.0'
  semver: '>=7'

trustPolicy: no-downgrade
